server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback. The HTML shell must NOT be cached (deploys swap it for new
  # hashed asset URLs); hashed assets below get the long-cache half of the
  # split. `no-cache` still allows conditional revalidation via ETag.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control 'no-cache';
  }

  location = /index.html {
    add_header Cache-Control 'no-cache';
  }

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Duel share vanity route: verveq.com/s/d/:linkCode (+ /card.png) proxies
  # straight through to the Convex .site httpAction, which serves the OG
  # taunt card to link-preview crawlers and 302s humans to /duel/:linkCode.
  # ^~ so /s/d/.../card.png never falls into the static-asset regex below.
  # The original path and User-Agent must reach Convex intact — crawler
  # detection runs on the UA. The upstream hostname is resolved per-request
  # (variable + resolver) because Convex sits behind a cloud LB whose IPs
  # rotate; a reload-time-resolved upstream would eventually go stale.
  location ^~ /s/d/ {
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $convex_site admired-warthog-495.eu-west-1.convex.site;
    proxy_pass https://$convex_site;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_ssl_name $convex_site;
    proxy_set_header Host $convex_site;
    proxy_set_header User-Agent $http_user_agent;
    proxy_redirect off;
    proxy_connect_timeout 5s;
    proxy_read_timeout 15s;
  }

  # Crawler files are real static files — serve them as-is (they carry no
  # matching extension below, so without these blocks they would fall through
  # to the SPA fallback and soft-404 as the app shell).
  location = /robots.txt {
    try_files $uri =404;
    add_header Cache-Control 'public, max-age=3600';
  }

  location = /sitemap.xml {
    try_files $uri =404;
    add_header Content-Type application/xml;
    add_header Cache-Control 'public, max-age=3600';
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control 'public, immutable';
  }
}
