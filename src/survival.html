<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1421">
    <title>VerveQ - Survival Mode</title>
    <link rel="stylesheet" href="/static/dark_football_theme.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    
    <!-- Additional styles specific to survival mode -->
    <style>
        /* Survival Mode Specific Styles */
        .survival-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .initials-display {
            font-family: var(--font-display);
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 20px;
            background: var(--stadium-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin: 20px 0;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5)); }
            50% { filter: drop-shadow(0 0 30px rgba(59, 130, 246, 0.8)); }
        }
        
        .timer-badge {
            background: var(--dark-accent);
            border: 2px solid var(--electric-blue);
            border-radius: 50px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: 600;
            box-shadow: var(--glow-blue);
        }
        
        .timer-value {
            color: var(--gold-accent);
            font-family: var(--font-display);
        }
        
        .players-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin: 30px 0;
        }
        
        @media (max-width: 768px) {
            .players-section {
                grid-template-columns: 1fr;
            }
        }
        
        .player-card {
            background: var(--dark-secondary);
            border: 2px solid rgba(59, 130, 246, 0.2);
            border-radius: 25px;
            padding: 30px;
            transition: all var(--transition-medium);
            position: relative;
            overflow: hidden;
        }
        
        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--stadium-gradient);
            transform: scaleX(0);
            transition: transform var(--transition-medium);
        }
        
        .player-card.active::before {
            transform: scaleX(1);
        }
        
        .player-card.wrong {
            animation: shake 0.5s ease-in-out;
            border-color: var(--red-card);
        }
        
        .player-card.correct {
            animation: pulse-success 0.5s ease-in-out;
            border-color: var(--gold-accent);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        @keyframes pulse-success {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .player-name {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .lives-display {
            display: flex;
            gap: 5px;
            font-size: 1.8rem;
            filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.3));
        }
        
        .life-heart {
            transition: all var(--transition-fast);
        }
        
        .life-heart.lost {
            opacity: 0.3;
            filter: grayscale(100%);
            transform: scale(0.8);
        }
        
        .answer-input {
            width: 100%;
            padding: 15px 20px;
            background: var(--dark-primary);
            border: 2px solid var(--dark-elevated);
            border-radius: 15px;
            color: var(--text-primary);
            font-size: 1.1rem;
            transition: all var(--transition-fast);
            margin-bottom: 20px;
        }
        
        .answer-input:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: var(--glow-blue);
            background: rgba(13, 20, 33, 0.9);
        }
        
        .answer-input::placeholder {
            color: var(--text-muted);
        }
        
        .submit-section {
            margin-top: 30px;
            text-align: center;
        }
        
        .game-over-screen {
            text-align: center;
            padding: 60px 20px;
            display: none;
        }
        
        .winner-announcement {
            font-family: var(--font-display);
            font-size: 3rem;
            font-weight: 900;
            background: var(--stadium-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: scale-in 0.5s ease-out;
        }
        
        .winner-announcement.draw {
            background: linear-gradient(135deg, var(--gold-accent) 0%, var(--silver-accent) 50%, var(--gold-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: draw-glow 2s ease-in-out infinite;
        }
        
        @keyframes draw-glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(251, 191, 36, 0.3)); }
            50% { filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.6)); }
        }
        
        @keyframes scale-in {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .trophy-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: bounce 1s ease-in-out infinite;
        }
        
        .trophy-icon.draw {
            animation: shake-hands 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        @keyframes shake-hands {
            0%, 100% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.2) rotate(0deg); }
            75% { transform: scale(1.1) rotate(5deg); }
        }
        
        .game-stats {
            background: var(--dark-secondary);
            border-radius: 20px;
            padding: 30px;
            margin: 30px auto;
            max-width: 500px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--dark-elevated);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .stat-value {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        
        .connection-status {
            position: fixed;
            top: 90px;
            left: 20px;
            background: var(--dark-secondary);
            border: 2px solid var(--dark-elevated);
            border-radius: 50px;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 999;
            transition: all var(--transition-fast);
        }
        
        .connection-status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: currentColor;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .connection-status.online {
            color: #4CAF50;
            border-color: #4CAF50;
        }
        
        .connection-status.offline {
            color: var(--yellow-card);
            border-color: var(--yellow-card);
        }
        
        /* Loading overlay reusing main theme */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 20, 33, 0.95);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        /* Feedback messages with theme styling */
        .feedback {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: 600;
            z-index: 1000;
            display: none;
            animation: slide-in 0.3s ease-out;
            box-shadow: var(--shadow-heavy);
            backdrop-filter: blur(10px);
        }
        
        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .feedback.success {
            background: rgba(76, 175, 80, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .feedback.error {
            background: rgba(244, 67, 54, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .feedback.warning {
            background: rgba(255, 152, 0, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .feedback.info {
            background: rgba(33, 150, 243, 0.9);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Competitive Mode Styles */
        .competitive-toggle {
            background: var(--dark-secondary);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .mode-selector {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            justify-content: center;
        }
        
        .mode-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 10px;
            background: rgba(59, 130, 246, 0.1);
            border: 2px solid transparent;
            transition: all var(--transition-medium);
        }
        
        .mode-label:hover {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }
        
        .mode-label input[type="radio"] {
            margin: 0;
        }
        
        .mode-label input[type="radio"]:checked + .mode-text {
            color: var(--electric-blue);
            font-weight: 600;
        }
        
        .player-names {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .player-names input {
            background: var(--dark-primary);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 10px;
            padding: 12px 15px;
            color: var(--text-primary);
            font-size: 1rem;
            min-width: 150px;
            transition: border-color var(--transition-medium);
        }
        
        .player-names input:focus {
            outline: none;
            border-color: var(--electric-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }
        
        .player-elo {
            font-size: 0.9rem;
            color: var(--gold-accent);
            font-weight: 500;
            margin-top: 5px;
        }
        
        /* Match Results Modal */
        .match-results-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(13, 20, 33, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }
        
        .modal-content {
            background: var(--dark-secondary);
            border: 2px solid var(--electric-blue);
            border-radius: 25px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: var(--glow-blue);
        }
        
        .match-summary {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
            gap: 20px;
        }
        
        .player-result h3 {
            color: var(--electric-blue);
            margin-bottom: 10px;
        }
        
        .elo-change {
            font-size: 2rem;
            font-weight: 900;
            margin: 10px 0;
        }
        
        .elo-change:not([class*="negative"]) {
            color: var(--success-color);
        }
        
        .elo-change[style*="color: red"], .elo-change:has(text():contains("-")) {
            color: var(--red-card);
        }
        
        .final-elo {
            color: var(--gold-accent);
            font-weight: 600;
        }
        
        .vs {
            font-size: 2rem;
            font-weight: 900;
            color: var(--electric-blue);
        }
        
        .match-stats {
            background: rgba(59, 130, 246, 0.1);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
        }
        
        .match-stats p {
            margin: 5px 0;
            color: var(--text-secondary);
        }
        
        .modal-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .secondary-btn {
            background: var(--dark-accent);
            color: var(--text-primary);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-medium);
        }
        
        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }
        
        @media (max-width: 768px) {
            .player-names {
                flex-direction: column;
            }
            
            .match-summary {
                flex-direction: column;
                gap: 30px;
            }
            
            .modal-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Global Navigation -->
    <nav class="global-nav">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <span class="emoji">⚽</span>
                VerveQ
            </a>
            <div class="nav-links">
                <a href="/" class="nav-link">Home</a>
                <a href="/leaderboard.html" class="nav-link">🏆 Leaderboard</a>
                <a href="/admin/dashboard" class="nav-link admin-only">Admin</a>
            </div>
        </div>
    </nav>

    <!-- Connection Status Indicator -->
    <div class="connection-status online" id="connection-status">Online</div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="quiz-container">
        <!-- Game Screen -->
        <div id="game-screen">
            <!-- Header Section -->
            <section class="header">
                <h1>⚔️ Survival Mode ⚔️</h1>
                <p class="subtitle">Name football players by their initials - last one standing wins!</p>
            </section>

            <!-- Game Info Section -->
            <div class="question-card">
                <div class="question-header">
                    <div class="question-category">Current Initials</div>
                    <div class="timer-badge">
                        <span>⏱️</span>
                        <span class="timer-value" id="time-left">30</span>
                        <span>seconds</span>
                    </div>
                </div>
                
                <div class="initials-display" id="initials">? ?</div>
            </div>

            <!-- Players Section -->
            <div class="players-section">
                <!-- Player 1 -->
                <div class="player-card" id="player1-card">
                    <div class="player-header">
                        <h3 class="player-name">Player 1</h3>
                        <div class="lives-display" id="player1-lives">
                            <span class="life-heart">❤️</span>
                            <span class="life-heart">❤️</span>
                            <span class="life-heart">❤️</span>
                        </div>
                    </div>
                    <input 
                        type="text" 
                        class="answer-input" 
                        id="player1-answer" 
                        placeholder="Enter player name..."
                        autocomplete="off"
                        aria-label="Player 1 answer input"
                    >
                </div>

                <!-- Player 2 -->
                <div class="player-card" id="player2-card">
                    <div class="player-header">
                        <h3 class="player-name">Player 2</h3>
                        <div class="lives-display" id="player2-lives">
                            <span class="life-heart">❤️</span>
                            <span class="life-heart">❤️</span>
                            <span class="life-heart">❤️</span>
                        </div>
                    </div>
                    <input 
                        type="text" 
                        class="answer-input" 
                        id="player2-answer" 
                        placeholder="Enter player name..."
                        autocomplete="off"
                        aria-label="Player 2 answer input"
                    >
                </div>
            </div>

            <!-- Submit Button -->
            <div class="submit-section">
                <button class="primary-btn" id="submit-button">
                    Submit Answers
                    <span class="btn-arrow">→</span>
                </button>
            </div>

        </div>

        <!-- Game Over Screen -->
        <div class="game-over-screen" id="game-over-screen">
            <div class="trophy-icon">🏆</div>
            <div class="winner-announcement" id="winner-message">Player 1 Wins!</div>
            
            <div class="game-stats">
                <div class="stat-row">
                    <span class="stat-label">Players Found</span>
                    <span class="stat-value" id="stat-players-found">0</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Game Duration</span>
                    <span class="stat-value" id="stat-duration">0:00</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Initials Used</span>
                    <span class="stat-value" id="stat-initials">0</span>
                </div>
            </div>

            <div class="quiz-controls">
                <button class="primary-btn" onclick="game.resetGame()">
                    Play Again
                    <span class="btn-arrow">→</span>
                </button>
                <button class="home-btn" onclick="window.location.href='/'">
                    Back to Home
                </button>
            </div>
        </div>
    </div>

    <script>
        // API Base URL for dynamic deployment
        const API_BASE_URL = window.location.origin;
        
        const gameConfig = {
            totalLives: 3,
            timeLimit: 30,
            maxSpellingMistakes: 2
        };

        const domElements = {
            initials: document.getElementById('initials'),
            timeLeft: document.getElementById('time-left'),
            player1Lives: document.getElementById('player1-lives'),
            player2Lives: document.getElementById('player2-lives'),
            player1Answer: document.getElementById('player1-answer'),
            player2Answer: document.getElementById('player2-answer'),
            player1Card: document.getElementById('player1-card'),
            player2Card: document.getElementById('player2-card'),
            submitButton: document.getElementById('submit-button'),
            gameScreen: document.getElementById('game-screen'),
            gameOverScreen: document.getElementById('game-over-screen'),
            winnerMessage: document.getElementById('winner-message'),
            connectionStatus: document.getElementById('connection-status'),
            loadingOverlay: document.getElementById('loading-overlay'),
            statPlayersFound: document.getElementById('stat-players-found'),
            statDuration: document.getElementById('stat-duration'),
            statInitials: document.getElementById('stat-initials')
        };

        // Optimized survival game - aligned with main theme
        class OptimizedSurvivalGame {
            constructor() {
                this.initialsCache = new Map();
                this.currentInitials = null;
                this.currentPlayers = [];
                this.usedPlayers = new Set();
                this.usedInitials = new Set();
                this.gameState = {
                    player1: { lives: gameConfig.totalLives },
                    player2: { lives: gameConfig.totalLives },
                    isGameOver: false,
                    startTime: null
                };
                this.timer = null;
                this.timeLeft = 0;
                this.roundStartTime = null;
                this.fallbackData = null;
                this.isOfflineMode = false;
                this.retryCount = 0;
                this.maxRetries = 3;
                // Track round attempts to improve game flow
                this.roundAttempts = {
                    player1: false,  // Has player 1 attempted this round?
                    player2: false   // Has player 2 attempted this round?
                };
                
                // Elo Rating System Integration
                this.isCompetitiveMode = false;
                this.sessionId = null;
                this.matchId = null;
                this.player1Name = 'Player 1';
                this.player2Name = 'Player 2';
                this.player1Stats = null;
                this.player2Stats = null;
                this.matchStartTime = null;
                this.competitiveModeEnabled = false; // Flag to check if Elo system is available
                
                // Check if Elo system is available
                this.checkEloSystemAvailability();
            }
            
            // ================================
            // ELO RATING SYSTEM METHODS
            // ================================
            
            async checkEloSystemAvailability() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/elo/leaderboard?limit=1`);
                    this.competitiveModeEnabled = response.ok;
                    if (this.competitiveModeEnabled) {
                        this.addCompetitiveModeUI();
                    }
                } catch (error) {
                    this.competitiveModeEnabled = false;
                }
            }
            
            addCompetitiveModeUI() {
                // Add competitive mode toggle to the game info section
                const gameInfo = document.querySelector('.game-info');
                if (gameInfo) {
                    const competitiveToggle = document.createElement('div');
                    competitiveToggle.className = 'competitive-toggle';
                    competitiveToggle.innerHTML = `
                        <div class="mode-selector">
                            <label class="mode-label">
                                <input type="radio" name="gameMode" value="casual" checked>
                                <span class="mode-text">Casual</span>
                            </label>
                            <label class="mode-label">
                                <input type="radio" name="gameMode" value="competitive">
                                <span class="mode-text">Competitive (Elo)</span>
                            </label>
                        </div>
                        <div class="player-names" style="display: none;">
                            <input type="text" id="player1-name" placeholder="Player 1 Name" maxlength="20">
                            <input type="text" id="player2-name" placeholder="Player 2 Name" maxlength="20">
                            <button id="start-competitive" class="primary-btn">Start Match</button>
                        </div>
                    `;
                    gameInfo.appendChild(competitiveToggle);
                    
                    this.setupCompetitiveModeListeners();
                }
            }
            
            setupCompetitiveModeListeners() {
                const radios = document.querySelectorAll('input[name="gameMode"]');
                const playerNames = document.querySelector('.player-names');
                const startButton = document.getElementById('start-competitive');
                
                radios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        if (e.target.value === 'competitive') {
                            playerNames.style.display = 'block';
                        } else {
                            playerNames.style.display = 'none';
                            if (this.isCompetitiveMode) {
                                this.exitCompetitiveMode();
                            }
                        }
                    });
                });
                
                if (startButton) {
                    startButton.addEventListener('click', () => this.startCompetitiveMode());
                }
            }
            
            async startCompetitiveMode() {
                const player1Name = document.getElementById('player1-name')?.value.trim();
                const player2Name = document.getElementById('player2-name')?.value.trim();
                
                if (!player1Name || !player2Name) {
                    this.showFeedback('Please enter both player names', 'error');
                    return;
                }
                
                if (player1Name === player2Name) {
                    this.showFeedback('Player names must be different', 'error');
                    return;
                }
                
                try {
                    this.showFeedback('Starting competitive match...', 'info');
                    
                    // Generate unique session ID
                    this.sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    
                    // Create match
                    const matchResponse = await fetch(`${API_BASE_URL}/api/elo/match/create`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            player1_name: player1Name,
                            player2_name: player2Name,
                            session_id: this.sessionId
                        })
                    });
                    
                    if (!matchResponse.ok) {
                        throw new Error('Failed to create competitive match');
                    }
                    
                    const matchData = await matchResponse.json();
                    
                    // Store match information
                    this.isCompetitiveMode = true;
                    this.matchId = matchData.match_info.match_id;
                    this.player1Name = player1Name;
                    this.player2Name = player2Name;
                    this.player1Stats = matchData.match_info.player1;
                    this.player2Stats = matchData.match_info.player2;
                    this.matchStartTime = Date.now();
                    
                    // Update UI for competitive mode
                    this.updateCompetitiveUI();
                    
                    // Hide setup UI and show game
                    document.querySelector('.competitive-toggle').style.display = 'none';
                    
                    this.showFeedback(`Match started: ${player1Name} (${this.player1Stats.elo}) vs ${player2Name} (${this.player2Stats.elo})`, 'success');
                    
                } catch (error) {
                    this.showFeedback('Failed to start competitive match', 'error');

            }
            
            updateCompetitiveUI() {

                const player2Header = document.querySelector('.player-card:last-of-type h3');

            async exitCompetitiveMode() {

                    try {

                        await fetch(`${API_BASE_URL}/api/elo/match/${this.sessionId}/status`);

                    }

                this.matchId = null;
                this.player1Name = 'Player 1';

                this.player1Stats = null;
                this.player2Stats = null;
                
                // Reset UI
                document.querySelector('h1').innerHTML = '⚽ SURVIVAL MODE ⚽';
                const player1Header = document.querySelector('.player-card:first-of-type h3');
                const player2Header = document.querySelector('.player-card:last-of-type h3');
                if (player1Header) player1Header.innerHTML = 'Player 1';
                if (player2Header) player2Header.innerHTML = 'Player 2';
                
                const toggleDiv = document.querySelector('.competitive-toggle');

            async notifyRoundStart(initials) {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/elo/match/start-round`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: this.sessionId,
                            initials: initials
                        })
                    });
                    
                    if (!response.ok) {
                    }
                } catch (error) {
                }
            }
            
            async notifyAnswerAttempt(playerName, isCorrect, answer = '', timeTaken = 0) {
                if (!this.isCompetitiveMode || !this.sessionId) return;
                
                try {
                    const response = await fetch(`${API_BASE_URL}/api/elo/match/answer`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: this.sessionId,
                            player_name: playerName,
                            is_correct: isCorrect,
                            answer: answer,
                            time_taken: timeTaken
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        
                        // Handle match completion
                        if (result.match_status === 'finished') {
                            await this.handleMatchCompletion();
                        }
                        
                        return result;
                    }
                } catch (error) {
                }
                return null;
            }
            
            async notifyMatchDraw() {
                if (!this.isCompetitiveMode || !this.sessionId) return;
                
                try {
                    // Calculate match duration and other stats
                    const matchDuration = Math.floor((Date.now() - this.matchStartTime) / 1000);
                    const roundsPlayed = this.usedInitials.size;
                    
                    const response = await fetch(`${API_BASE_URL}/api/elo/match/finish`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            session_id: this.sessionId,
                            result: 'draw',
                            rounds_played: roundsPlayed,
                            match_duration: matchDuration,
                            player1_lives_lost: gameConfig.totalLives - this.gameState.player1.lives,
                            player2_lives_lost: gameConfig.totalLives - this.gameState.player2.lives
                        })
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        
                        // Show match results if available
                        if (result.final_summary) {
                            this.showMatchResults(result.final_summary);
                        }
                        
                        return result;
                    } else {
                    }
                } catch (error) {
                }
                return null;
            }
            
            async handleMatchCompletion() {
                try {
                    // Get final match summary
                    const response = await fetch(`${API_BASE_URL}/api/elo/match/${this.sessionId}/status`);
                    if (response.ok) {
                        const summary = await response.json();
                        this.showMatchResults(summary);

                } catch (error) {
                }

                                <h3>${summary.player2_name}</h3>

            startNewMatch() {
                // Remove any existing modal
                const modal = document.querySelector('.match-results-modal');
                if (modal) modal.remove();
                
                // Reset competitive mode to setup
                this.exitCompetitiveMode();
                
                // Show setup UI again
                const toggleDiv = document.querySelector('.competitive-toggle');
                if (toggleDiv) {
                    toggleDiv.style.display = 'block';
                    // Reset to competitive mode
                    const competitiveRadio = document.querySelector('input[name="gameMode"][value="competitive"]');
                    if (competitiveRadio) {
                        competitiveRadio.checked = true;
                        document.querySelector('.player-names').style.display = 'block';
                    }
                }
            }
            
            async init() {
                this.gameState.startTime = Date.now();
                
                // Try to load fallback data first
                await this.loadFallbackData();
                
                // Preload popular initials
                await this.preloadPopularInitials();
                
                // Set up event listeners
                this.setupEventListeners();
                
                // Load first round
                await this.loadNewRound();
            }
            
            async loadFallbackData() {
                try {
                    const response = await fetch(`${API_BASE_URL}/survival_initials_map.json`);
                    if (!response.ok) {
                        throw new Error('Failed to load fallback data');
                    }
                    const data = await response.json();
                    this.fallbackData = data;
                } catch (error) {
                    // Create minimal fallback data
                    this.fallbackData = {
                        initials_map: {
                            "CR": ["Cristiano Ronaldo", "Carlos Rodriguez", "Christian Ramirez"],
                            "LM": ["Lionel Messi", "Lucas Moura", "Luis Muriel"],
                            "KM": ["Kylian Mbappé", "Kevin De Bruyne", "Karim Benzema"],
                            "MR": ["Marcus Rashford", "Marco Reus", "Manuel Neuer"],
                            "PS": ["Paul Scholes", "Paolo Maldini", "Peter Schmeichel"],
                            "RK": ["Robert Lewandowski", "Ryan Giggs", "Roberto Carlos"],
                            "SR": ["Sergio Ramos", "Steven Gerrard", "Samuel Eto'o"],
                            "TC": ["Thibaut Courtois", "Toni Kroos", "Thomas Müller"]
                        }
                    };
                }
            }
            
            async loadFallbackRound() {
                if (!this.fallbackData || !this.fallbackData.initials_map) {
                    return null;
                }
                
                const availableInitials = Object.keys(this.fallbackData.initials_map);
                if (availableInitials.length === 0) {
                    return null;
                }
                
                // Pick random initials
                const randomInitials = availableInitials[Math.floor(Math.random() * availableInitials.length)];
                const players = this.fallbackData.initials_map[randomInitials] || [];
                
                return {
                    roundData: {
                        initials: randomInitials,
                        initials_formatted: `${randomInitials[0]} ${randomInitials[1]}`,
                        possible_answers_count: players.length,
                        round_id: `fallback_${randomInitials}_${Date.now()}`
                    },
                    playersData: {
                        initials: randomInitials,
                        players: players,
                        count: players.length,
                        cached: false
                    }
                };
            }
            
            setupEventListeners() {
                domElements.submitButton.addEventListener('click', () => this.handleSubmit());
                
                // Allow Enter key to submit
                domElements.player1Answer.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleSubmit();
                });
                
                domElements.player2Answer.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleSubmit();
                });
                
                // Focus management
                domElements.player1Answer.addEventListener('focus', () => {
                    domElements.player1Card.classList.add('active');
                });
                
                domElements.player1Answer.addEventListener('blur', () => {
                    domElements.player1Card.classList.remove('active');
                });
                
                domElements.player2Answer.addEventListener('focus', () => {
                    domElements.player2Card.classList.add('active');
                });
                
                domElements.player2Answer.addEventListener('blur', () => {
                    domElements.player2Card.classList.remove('active');
                });
            }
            
            async preloadPopularInitials() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/survival/preload`);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    const data = await response.json();
                } catch (error) {
                    // Non-critical, game can continue without preloading
                }
            }
            
            async loadNewRound() {
                try {
                    this.roundStartTime = Date.now();
                    this.showLoading(true);
                    this.showFeedback('Loading new round...', 'info');
                    
                    // Try to get new round from API
                    let roundData = null;
                    let playersData = null;
                    
                    try {
                        const response = await fetch(`${API_BASE_URL}/survival/round`, {
                            method: 'GET',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            signal: AbortSignal.timeout(5000) // 5 second timeout
                        });
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        roundData = await response.json();
                        this.currentInitials = roundData.initials;
                        
                        // Notify match manager in competitive mode
                        if (this.isCompetitiveMode && this.sessionId) {
                            await this.notifyRoundStart(this.currentInitials);
                        }
                        
                        // Load players for these initials
                        const playersResponse = await fetch(`${API_BASE_URL}/api/survival/initials/${this.currentInitials}`, {
                            signal: AbortSignal.timeout(5000)
                        });
                        
                        if (!playersResponse.ok) {
                            throw new Error(`Failed to load players: ${playersResponse.status}`);
                        }
                        
                        playersData = await playersResponse.json();
                        this.isOfflineMode = false;
                        this.retryCount = 0;
                        
                    } catch (apiError) {
                        
                        // Use fallback mode
                        const fallbackResult = await this.loadFallbackRound();
                        if (!fallbackResult) {
                            throw new Error('Failed to load round in offline mode');
                        }
                        
                        roundData = fallbackResult.roundData;
                        playersData = fallbackResult.playersData;
                        this.currentInitials = roundData.initials;
                        this.isOfflineMode = true;
                        
                        // Notify match manager in competitive mode
                        if (this.isCompetitiveMode && this.sessionId) {
                            await this.notifyRoundStart(this.currentInitials);
                        }
                        
                        this.showFeedback('Running in offline mode', 'warning');
                    }
                    
                    // Process the data (same for both modes)
                    this.currentPlayers = playersData.players.filter(p => !this.usedPlayers.has(p));
                    
                    // Check if we have enough players
                    if (this.currentPlayers.length === 0) {
                        // Try a different set of initials
                        if (this.retryCount < this.maxRetries) {
                            this.retryCount++;
                            return this.loadNewRound();
                        } else {
                            // Reset used players if we've exhausted options
                            this.usedPlayers.clear();
                            this.currentPlayers = playersData.players;
                            this.showFeedback('Starting fresh - all players available again!', 'info');
                        }
                    }
                    
                    // Track used initials
                    this.usedInitials.add(this.currentInitials);
                    
                    // Cache for performance
                    this.initialsCache.set(this.currentInitials, playersData.players);
                    
                    // Reset round attempts for new round
                    this.roundAttempts = {
                        player1: false,
                        player2: false
                    };
                    
                    // Update display
                    this.updateDisplay(roundData);
                    
                    // Start timer
                    this.startTimer();
                    
                    // Reset inputs
                    this.resetInputs();
                    
                    // Hide loading
                    this.showLoading(false);
                    
                    // Clear previous feedback
                    setTimeout(() => {
                        const feedback = document.getElementById('feedback');
                        if (feedback && feedback.textContent === 'Loading new round...') {
                            feedback.style.display = 'none';
                        }
                    }, 1000);
                    
                    
                } catch (error) {
                    this.showLoading(false);
                    this.showError('Failed to load new round. Please check your connection and try again.');
                    
                    // Try to recover by loading cached data
                    if (this.initialsCache.size > 0) {
                        const cachedInitials = Array.from(this.initialsCache.keys());
                        const randomCached = cachedInitials[Math.floor(Math.random() * cachedInitials.length)];
                        this.currentInitials = randomCached;
                        this.currentPlayers = this.initialsCache.get(randomCached).filter(p => !this.usedPlayers.has(p));
                        
                        this.updateDisplay({
                            initials: randomCached,
                            initials_formatted: `${randomCached[0]} ${randomCached[1]}`
                        });
                        
                        this.startTimer();
                        this.resetInputs();
                        this.showFeedback('Using cached data', 'warning');
                    }
                }
            }
            
            async handleSubmit() {
                if (this.gameState.isGameOver) return;
                
                const player1Answer = domElements.player1Answer.value.trim();
                const player2Answer = domElements.player2Answer.value.trim();
                
                if (!player1Answer && !player2Answer) {
                    this.showError('Both players must enter an answer!');
                    return;
                }
                
                // Disable submit button during validation
                domElements.submitButton.disabled = true;
                
                // Validate both answers
                const results = await Promise.all([
                    player1Answer ? this.validateAnswer(player1Answer, 'player1') : Promise.resolve({valid: false, player: 'player1'}),
                    player2Answer ? this.validateAnswer(player2Answer, 'player2') : Promise.resolve({valid: false, player: 'player2'})
                ]);
                
                // Process results - collect life losses first, then check for game over
                let anyCorrect = false;
                const lifeLosses = [];
                
                for (const result of results) {
                    if (result.valid) {
                        anyCorrect = true;
                        // Don't break here - we need to check both answers for potential life losses
                    } else if ((result.player === 'player1' && player1Answer) || (result.player === 'player2' && player2Answer)) {
                        lifeLosses.push(result.player);
                    }
                }
                
                // Process all life losses together to detect simultaneous game over
                if (lifeLosses.length > 0) {
                    this.processLifeLosses(lifeLosses);
                }
                
                // Re-enable submit button
                domElements.submitButton.disabled = false;
                
                if (!anyCorrect && !this.gameState.isGameOver) {
                    // Check if both players have now attempted this round
                    if (this.roundAttempts.player1 && this.roundAttempts.player2) {
                        // Both players have attempted and failed - advance immediately
                        this.stopTimer();
                        this.showFeedback('Both players failed - advancing to next round!', 'warning');
                        setTimeout(() => this.loadNewRound(), 1500);
                    } else {
                        // At least one player hasn't attempted yet - reset inputs and continue
                        this.resetInputs();
                    }
                }
            }
            
            async validateAnswer(answer, playerId) {
                if (!answer.trim()) return {valid: false, player: playerId};
                
                // If in offline mode, validate locally
                if (this.isOfflineMode) {
                    const normalizedAnswer = answer.trim().toLowerCase();
                    
                    // Check against current players list
                    for (const player of this.currentPlayers) {
                        if (player.toLowerCase() === normalizedAnswer) {
                            this.handleCorrectAnswer(player, playerId);
                            return {valid: true, player: playerId, matched_player: player};
                        }
                    }
                    
                    // Simple fuzzy matching for offline mode
                    for (const player of this.currentPlayers) {
                        const playerLower = player.toLowerCase();
                        // Check if answer is a substring or very similar
                        if (playerLower.includes(normalizedAnswer) || normalizedAnswer.includes(playerLower)) {
                            if (Math.abs(playerLower.length - normalizedAnswer.length) <= 2) {
                                this.handleCorrectAnswer(player, playerId);
                                return {valid: true, player: playerId, matched_player: player};
                            }
                        }
                    }
                    
                    return {valid: false, player: playerId};
                }
                
                // Online mode - use API
                try {
                    const response = await fetch(`${API_BASE_URL}/api/survival/validate`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            answer: answer,
                            initials: this.currentInitials
                        }),
                        signal: AbortSignal.timeout(5000) // 5 second timeout
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const result = await response.json();
                    
                    if (result.valid) {
                        this.handleCorrectAnswer(result.matched_player, playerId);
                        return {valid: true, player: playerId, matched_player: result.matched_player};
                    } else {
                        return {valid: false, player: playerId};
                    }
                    
                } catch (error) {
                    
                    // Fall back to offline validation
                    this.isOfflineMode = true;
                    this.showFeedback('Switching to offline mode', 'warning');
                    return this.validateAnswer(answer, playerId);
                }
            }
            
            async handleCorrectAnswer(playerName, playerId) {
                this.usedPlayers.add(playerName);
                this.currentPlayers = this.currentPlayers.filter(p => p !== playerName);
                
                const roundTime = ((Date.now() - this.roundStartTime) / 1000).toFixed(1);
                const playerCard = playerId === 'player1' ? domElements.player1Card : domElements.player2Card;
                
                // Visual feedback
                playerCard.classList.add('correct');
                setTimeout(() => playerCard.classList.remove('correct'), 1000);
                
                // Notify competitive mode
                if (this.isCompetitiveMode) {
                    const competitivePlayerName = playerId === 'player1' ? this.player1Name : this.player2Name;
                    await this.notifyAnswerAttempt(competitivePlayerName, true, playerName, parseFloat(roundTime));
                }
                
                this.showFeedback(`✅ ${playerId.toUpperCase()}: ${playerName} (${roundTime}s)`, 'success');
                
                
                // Check if round is complete
                if (this.currentPlayers.length === 0) {
                    this.stopTimer();
                    this.showFeedback('All players found for these initials - next round!', 'success');
                    setTimeout(() => this.loadNewRound(), 1500);
                } else {
                    // Continue with same round
                    this.resetInputs();
                }
            }
            
            async processLifeLosses(playerIds) {
                // Process all life losses simultaneously to detect draws
                const lifeLossResults = [];
                
                for (const playerId of playerIds) {
                    this.gameState[playerId].lives--;
                    
                    // Track that this player has attempted this round
                    this.roundAttempts[playerId] = true;
                    
                    // Visual feedback
                    const playerCard = playerId === 'player1' ? domElements.player1Card : domElements.player2Card;
                    playerCard.classList.add('wrong');
                    setTimeout(() => playerCard.classList.remove('wrong'), 1000);
                    
                    // Notify competitive mode
                    if (this.isCompetitiveMode) {
                        const competitivePlayerName = playerId === 'player1' ? this.player1Name : this.player2Name;
                        const roundTime = ((Date.now() - this.roundStartTime) / 1000).toFixed(1);
                        const playerAnswer = playerId === 'player1' ? domElements.player1Answer.value : domElements.player2Answer.value;
                        await this.notifyAnswerAttempt(competitivePlayerName, false, playerAnswer, parseFloat(roundTime));
                    }
                    
                    this.showFeedback(`❌ ${playerId.toUpperCase()}: Wrong answer! Lives: ${this.gameState[playerId].lives}`, 'error');
                    
                    lifeLossResults.push({
                        playerId: playerId,
                        livesRemaining: this.gameState[playerId].lives
                    });
                }
                
                this.updateLivesDisplay();
                
                // Check for game over conditions after all life losses are processed
                this.checkGameOverConditions(lifeLossResults);
            }
            
            async handleWrongAnswer(playerId) {
                // Legacy method - now just calls processLifeLosses for single player
                await this.processLifeLosses([playerId]);
            }
            
            checkGameOverConditions(lifeLossResults) {
                // Check if any players have reached 0 lives
                const playersAtZero = lifeLossResults.filter(result => result.livesRemaining <= 0);
                
                if (playersAtZero.length === 0) {
                    // No one has lost all lives, continue game
                    return;
                }
                
                if (playersAtZero.length === 2) {
                    // Both players lost their last life simultaneously - it's a draw!
                    this.gameOverDraw();
                } else if (playersAtZero.length === 1) {
                    // Single player lost - normal win condition
                    const losingPlayerId = playersAtZero[0].playerId;
                    this.gameOver(losingPlayerId);
                }
            }
            
            gameOverDraw() {
                this.gameState.isGameOver = true;
                this.stopTimer();
                
                const gameDuration = Date.now() - this.gameState.startTime;
                const minutes = Math.floor(gameDuration / 60000);
                const seconds = Math.floor((gameDuration % 60000) / 1000);
                
                // Notify competitive mode about draw
                if (this.isCompetitiveMode && this.sessionId) {
                    this.notifyMatchDraw();
                }
                
                domElements.winnerMessage.textContent = `🤝 It's a Draw! 🤝`;
                domElements.winnerMessage.classList.add('draw');
                domElements.statPlayersFound.textContent = this.usedPlayers.size;
                domElements.statDuration.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                domElements.statInitials.textContent = this.usedInitials.size;
                
                domElements.gameScreen.style.display = 'none';
                domElements.gameOverScreen.style.display = 'block';
                
                // Update trophy icon for draw
                const trophyIcon = document.querySelector('.trophy-icon');
                if (trophyIcon) {
                    trophyIcon.textContent = '🤝';
                    trophyIcon.classList.add('draw');
                }
                
            }
            
            gameOver(losingPlayerId) {
                this.gameState.isGameOver = true;
                this.stopTimer();
                
                const winner = losingPlayerId === 'player1' ? 'Player 2' : 'Player 1';
                const gameDuration = Date.now() - this.gameState.startTime;
                const minutes = Math.floor(gameDuration / 60000);
                const seconds = Math.floor((gameDuration % 60000) / 1000);
                
                domElements.winnerMessage.textContent = `🏆 ${winner} Wins! 🏆`;
                domElements.winnerMessage.classList.remove('draw');
                domElements.statPlayersFound.textContent = this.usedPlayers.size;
                domElements.statDuration.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                domElements.statInitials.textContent = this.usedInitials.size;
                
                domElements.gameScreen.style.display = 'none';
                domElements.gameOverScreen.style.display = 'block';
                
                // Reset trophy icon for normal win
                const trophyIcon = document.querySelector('.trophy-icon');
                if (trophyIcon) {
                    trophyIcon.textContent = '🏆';
                    trophyIcon.classList.remove('draw');
                }
                
            }
            
            updateDisplay(roundData) {
                domElements.initials.textContent = roundData.initials_formatted || `${this.currentInitials[0]} ${this.currentInitials[1]}`;
                this.updateLivesDisplay();
            }
            
            updateLivesDisplay() {
                // Update Player 1 lives
                const player1Hearts = domElements.player1Lives.querySelectorAll('.life-heart');
                player1Hearts.forEach((heart, index) => {
                    if (index >= this.gameState.player1.lives) {
                        heart.classList.add('lost');
                    } else {
                        heart.classList.remove('lost');
                    }
                });
                
                // Update Player 2 lives
                const player2Hearts = domElements.player2Lives.querySelectorAll('.life-heart');
                player2Hearts.forEach((heart, index) => {
                    if (index >= this.gameState.player2.lives) {
                        heart.classList.add('lost');
                    } else {
                        heart.classList.remove('lost');
                    }
                });
            }
            
            
            updateConnectionStatus() {
                if (this.isOfflineMode) {
                    domElements.connectionStatus.textContent = 'Offline Mode';
                    domElements.connectionStatus.className = 'connection-status offline';
                } else {
                    domElements.connectionStatus.textContent = 'Online';
                    domElements.connectionStatus.className = 'connection-status online';
                }
            }
            
            startTimer() {
                this.timeLeft = gameConfig.timeLimit;
                this.updateTimerDisplay();
                
                this.timer = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerDisplay();
                    
                    if (this.timeLeft <= 0) {
                        this.handleTimeUp();
                    }
                }, 1000);
            }
            
            stopTimer() {
                if (this.timer) {
                    clearInterval(this.timer);
                    this.timer = null;
                }
            }
            
            updateTimerDisplay() {
                domElements.timeLeft.textContent = this.timeLeft;
                
                // Change color based on time remaining
                if (this.timeLeft <= 10) {
                    domElements.timeLeft.style.color = 'var(--red-card)';
                } else if (this.timeLeft <= 20) {
                    domElements.timeLeft.style.color = 'var(--yellow-card)';
                } else {
                    domElements.timeLeft.style.color = 'var(--gold-accent)';
                }
            }
            
            handleTimeUp() {
                this.stopTimer();
                this.showFeedback('⏰ Time\'s up! Moving to next round...', 'warning');
                setTimeout(() => this.loadNewRound(), 2000);
            }
            
            resetInputs() {
                domElements.player1Answer.value = '';
                domElements.player2Answer.value = '';
                domElements.player1Answer.focus();
            }
            
            showFeedback(message, type) {
                // Create or update feedback element
                let feedback = document.getElementById('feedback');
                if (!feedback) {
                    feedback = document.createElement('div');
                    feedback.id = 'feedback';
                    feedback.className = 'feedback';
                    document.body.appendChild(feedback);
                }
                
                feedback.textContent = message;
                feedback.className = `feedback ${type}`;
                feedback.style.display = 'block';
                
                // Don't auto-hide info messages about loading
                if (type !== 'info' || !message.includes('Loading')) {
                    setTimeout(() => {
                        feedback.style.display = 'none';
                    }, 3000);
                }
            }
            
            showError(message) {
                this.showFeedback(message, 'error');
            }
            
            showLoading(show) {
                domElements.loadingOverlay.style.display = show ? 'flex' : 'none';
            }
            
            resetGame() {
                this.gameState = {
                    player1: { lives: gameConfig.totalLives },
                    player2: { lives: gameConfig.totalLives },
                    isGameOver: false,
                    startTime: Date.now()
                };
                this.usedPlayers.clear();
                this.usedInitials.clear();
                this.currentInitials = null;
                this.currentPlayers = [];
                this.roundAttempts = {
                    player1: false,
                    player2: false
                };
                this.stopTimer();
                
                // Reset UI state
                domElements.gameScreen.style.display = 'block';
                domElements.gameOverScreen.style.display = 'none';
                domElements.submitButton.disabled = false;
                
                // Clear draw styling
                domElements.winnerMessage.classList.remove('draw');
                const trophyIcon = document.querySelector('.trophy-icon');
                if (trophyIcon) {
                    trophyIcon.classList.remove('draw');
                    trophyIcon.textContent = '🏆';
                }
                
                this.loadNewRound();
            }
            
        }
        
        // Initialize the optimized game
        const game = new OptimizedSurvivalGame();
        
        // Start the game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            game.init();
        });
        
        
    </script>
</body>
</html>
