name: Check

# Runs the full local gate (`npm run check` = codegen + tsc -b + lint +
# vitest + build) on every push to master and on every pull request.
#
# This workflow verifies; it never deploys. It carries no secrets:
#   - convex/_generated is gitignored, so CI regenerates it via the offline
#     codegen step (app/scripts/ensureConvexGenerated.mjs) — a pure local
#     Node script that needs no Convex deployment credentials.
#   - the production build's Sentry source-map upload is gated on credentials
#     being present (vite.config.ts); with none, it is skipped entirely.
# Permissions are read-only and no secrets are referenced anywhere below.

on:
  push:
    branches:
      - master
  pull_request:

# Cancel superseded runs for the same PR; let each master push run to
# completion so every landed commit is independently verified.
concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    name: npm run check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run check gate (codegen + tsc -b + lint + test + build)
        run: npm run check
